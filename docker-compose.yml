services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://postgres:fundingsathicrm@postgres:5432/fundingsathicrm
      - SECRET_KEY=e84bb91e4680d11d396909970785694a5c09fc7e9c9c142c583a2ede7d10ecf9
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
      - ALLOWED_HOSTS=localhost
      - FRONTEND_URL=http://localhost
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=your-email@gmail.com
      - SMTP_PASSWORD=your-app-specific-password
      - EMAIL_FROM=noreply@fundingsathi.com
    ports:
      - "8085:8085"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: fundingsathicrm
      POSTGRES_DB: fundingsathicrm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  postgres_data:
